<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/img/google.png">
    <title>Google</title>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav_header">
                <a href="#">Gmail</a>
                <a href="#">Images</a>
            </div>
            <div class="config">
                <a href="#"><img src="assets/img/icons/apps_27dp_333_FILL0_wght400_GRAD0_opsz24.svg" alt="config"></a>
            </div>
            <div class="avatar">
                <a href="#"><img src="assets/img/OIP.jpg" alt="User Profile"> </a>
            </div>
        </div>
    </header>
    
    <main>  
        <div class="container-main">
            <div class="logo">
                <img src="assets/img/google (1).png" alt="Google Logo">
            </div>
            <form action="#" method="get" class="search-form">
                <button type="button" class="btn-add" aria-label="Arquivos">
                    <img src="assets/img/icons/add_27dp_292929_FILL0_wght400_GRAD0_opsz24.svg" alt="Arquivos">
                </button>
                <input type="text" name="search">
                <button type="submit" class="btn-search" aria-label="teclado">
                    <img src="assets/img/icons/keyboard_27dp_292929_FILL0_wght400_GRAD0_opsz24.svg" alt="teclado">
                </button>
                <button type="submit" class="btn-search" aria-label="microfone">
                    <img src="assets/img/icons/mic_27dp_292929_FILL0_wght400_GRAD0_opsz24.svg" alt="microfone">
                </button>
                <button type="submit" class="btn-search" aria-label="fotos">
                    <img src="assets/img/icons/add_a_photo_27dp_292929_FILL0_wght400_GRAD0_opsz24.svg" alt="fotos">
                </button>
                <button type="submit" class="btn-search" aria-label="Pesquisar">
                    <img src="assets/img/icons/search_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.svg" alt="Pesquisar">
                </button>
            </form>
        </div>
    </main>
    
    <footer>
        <div class="container-footer">
            <div class="country">
                <p>Brasil</p>
            </div>
            <div class="links">
                <div class="links-first">
                    <a href="#">Sobre</a>
                    <a href="#">Publicidade</a>
                    <a href="#">Negócios</a>
                    <a href="#">Como funciona a Pesquisa</a>
                </div>
                <div class="links-later">
                    <a href="#">Privacidade</a>
                    <a href="#">Termos</a>
                    <a href="#">Configurações</a>
                </div>

            </div>
        </div>
    </footer>
    
</body>
</html>
